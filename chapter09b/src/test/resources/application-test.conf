pekko {
  actor {
    provider = "cluster"
  }

  remote {
    artery {
      transport = tcp
      canonical {
        hostname = 127.0.0.1
        port = 2552
      }
    }
  }

  cluster {                 
    seed-nodes = [
     "pekko://SpContainerTest@127.0.0.1:2552"
    ]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }
}
