[versions]
kotlin = "2.2.21"
kotlin-coroutines = "1.10.2"
pekko = "1.5.0"
logback = "1.3.14"
kotest = "6.1.1"
junit = "6.0.3"
mockk = "1.14.9"

[libraries]
kotlin-gradle-plugin = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin"}
kotlin-coroutines = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlin-coroutines"}
pekko-bom = { group = "org.apache.pekko", name = "pekko-bom_2.13", version.ref = "pekko" }
logback = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
kotest-bom = { group = "io.kotest", name = "kotest-bom", version.ref = "kotest" }
junit-bom = { group = "org.junit", name = "junit-bom", version.ref = "junit"}
mockk = { group = "io.mockk", name = "mockk", version.ref = "mockk" }