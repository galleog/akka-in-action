pekko {
  actor {
    provider = "cluster"
  }

  remote {            
    artery {
      transport = tcp
      canonical {
        hostname = 127.0.0.1
      }
    }
  }

  cluster {                 
    seed-nodes = [
      "pekko://LoggerSharded@127.0.0.1:25251",
      "pekko://LoggerSharded@127.0.0.1:25252"
    ]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }
}
